# Protocol Gateway configuration — DEVELOPMENT ENVIRONMENT
# Ports offset +100 from prod so prod and dev can run simultaneously.
# DO NOT use these ports in production.

[server]
auth_listen = "0.0.0.0:2208"    # Dev auth port (prod: 2108)
game_listen = "0.0.0.0:7877"    # Dev game port (prod: 7777)
max_connections = 100            # Low cap for dev (prod: 2000)
country = 5
server_id = 99                   # Dev server ID (prod: 10)

[crypto]
# Same keys as prod — dev uses same crypto pipeline for parity testing
bf_static_key = "6B60CB5B82CE90B1CC2B6C556C6C6C6C"
rsa_key_file = "config/rsa_private.pem"

[database]
host = "127.0.0.1"
port = 5432
name = "aion_account_db"        # Same DB as prod; use separate DB if needed
user = "postgres"
password_env = "AIONCORE_DB_PASS"
pool_size = 5                    # Smaller pool for dev

[redis]
addr = "127.0.0.1:6379"
db = 2                           # Redis DB 2 for dev (prod uses DB 0)
pool_size = 5

[logging]
level = "debug"                  # Verbose logging for development
