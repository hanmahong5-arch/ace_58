# AionCore 5.8 server CI — Round 13 A1 baseline
#
# 设计要点（functional comments）：
#   - 仓位作用域: server/src/internal/... + 5 个稳定的 cmd/* + tinyclient
#     （cmd/spike 和 cmd/director 是 WIP，编译会失败 — 详见 server/doc/ci.md）
#   - 触发: push 到 main + 所有 PR
#   - Go 版本: 1.25.7（与 server/src/go.mod 对齐）
#   - 并发: 同分支取消旧 run，避免堆 minutes
#   - 权限: 只读 contents（不发 release / 不写 packages）
#   - Lua 语法检查: 仅在 runner 提供 luac 时跑；缺则跳过（不阻塞主门）
#
# 与仓库根 .github/workflows/ci.yml 的差异：
#   根 CI 跑 `go ./...`（包含 spike 等 WIP 路径，已知会红）
#   本 CI 是 server 子仓的"绿色基线"，给 R13 后续 round 提供稳定信号
#
# 失败语义（fail-fast）：
#   - lint / build / test 任何一步红 → workflow 红
#   - lua-syntax 是 best-effort，soft-fail（continue-on-error）

name: AionCore server (internal-only)

on:
  push:
    branches: [main]
    paths:
      - 'ACE_5.8/server/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ACE_5.8/server/**'

# 同分支只跑最新一次，先前的 in-flight run 取消，节省 CI 配额
concurrency:
  group: aioncore-server-${{ github.ref }}
  cancel-in-progress: true

# 最小权限：CI 只读源码即可
permissions:
  contents: read

env:
  GO_VERSION: '1.25.7'
  WORK_DIR: ACE_5.8/server/src
  # 显式列出可编译的 cmd 目标，把 WIP 的 spike/director 隔离在外。
  # 2026-05-06 R5 swarm 收口加入 ./cmd/loadgen（有 12 测试 + 自身 metrics endpoint）。
  STABLE_CMDS: ./cmd/gateway ./cmd/world ./cmd/chat ./cmd/logd ./cmd/admin ./cmd/tinyclient ./cmd/loadgen
  # 含测试的 cmd 子集 — 用于 test step 显式纳入回归门。
  # gateway/world/chat 是 main 无测试，跑了也是 "[no test files]"，不阻塞但浪费 race 编译时间。
  TESTABLE_CMDS: ./cmd/admin ./cmd/logd ./cmd/loadgen ./cmd/tinyclient

jobs:
  # -----------------------------------------------------------------
  # go-ci — vet + build + test + coverage（一条流水，失败即停）
  # -----------------------------------------------------------------
  go-ci:
    name: go (vet + build + test + cover)
    runs-on: ubuntu-latest
    # 单 job 内子步骤天然 fail-fast：上一步红就停
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go (with module cache)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.WORK_DIR }}/go.sum

      - name: go mod download
        working-directory: ${{ env.WORK_DIR }}
        run: go mod download

      - name: go vet (internal + stable cmds)
        working-directory: ${{ env.WORK_DIR }}
        run: go vet ./internal/... ${{ env.STABLE_CMDS }}

      # 显式列出每个稳定的 cmd 目标 — 不要 ./cmd/...，那会带上 spike/director（WIP）
      - name: go build (internal + 7 stable cmds)
        working-directory: ${{ env.WORK_DIR }}
        run: go build ./internal/... ${{ env.STABLE_CMDS }}

      # -race 需要 cgo 在 Linux runner 上是默认开的；不显式写 CGO_ENABLED=1
      # cmd test 子集 (admin/logd/loadgen/tinyclient) 在 R5 swarm 后纳入回归门，
      # 之前 doc/ci.md §2 "./cmd 下没有测试文件" 断言已不再成立。
      - name: go test (race + coverage)
        working-directory: ${{ env.WORK_DIR }}
        run: |
          go test ./internal/... ${{ env.TESTABLE_CMDS }} \
            -count=1 \
            -race \
            -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: coverage summary (stdout)
        working-directory: ${{ env.WORK_DIR }}
        run: go tool cover -func=coverage.out | tail -1

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-internal
          path: ${{ env.WORK_DIR }}/coverage.out
          retention-days: 14
          if-no-files-found: error

  # -----------------------------------------------------------------
  # lua-syntax — best-effort 语法检查，不阻塞主门
  # 只在 runner 上恰好有 luac 时跑；缺则 step 内 echo 跳过
  # -----------------------------------------------------------------
  lua-syntax:
    name: lua syntax (best-effort)
    runs-on: ubuntu-latest
    # 不依赖 go-ci，与之并行；失败也不阻塞 PR
    continue-on-error: true
    steps:
      - name: checkout
        uses: actions/checkout@v4

      # 检测 luac 是否可用，输出布尔到后续 step
      - name: detect luac
        id: detect
        run: |
          if command -v luac >/dev/null 2>&1; then
            echo "have_luac=1" >> "$GITHUB_OUTPUT"
            luac -v
          else
            echo "have_luac=0" >> "$GITHUB_OUTPUT"
            echo "luac not on PATH — skipping syntax check"
          fi

      # 仅在检测到 luac 时跑；批量编译所有 *.lua 到 /dev/null
      - name: luac -p over scripts/**/*.lua
        if: steps.detect.outputs.have_luac == '1'
        working-directory: ACE_5.8/server
        run: |
          fail=0
          # 使用 find 而非 shell glob，跨深度安全
          while IFS= read -r f; do
            if ! luac -p "$f"; then
              echo "::error file=$f::lua syntax error"
              fail=1
            fi
          done < <(find scripts -name '*.lua' -type f)
          exit $fail

  # -----------------------------------------------------------------
  # db-integration — 真打 PG 跑 internal/database 的 19 个 env-gated 测试
  #
  # 为什么独立 job（不并入 go-ci）：
  #   - go-ci 里 internal/database 的 SP 测试都 t.Skip（缺 AION_TEST_PG_*），
  #     该包覆盖率显示 0%；活化后 ~80%+，是单包覆盖率收益最大的一档。
  #   - 用 GitHub Actions service container（postgres:17-alpine）保证：
  #       (a) CI 隔离：每次 fresh DB，无配置漂移；
  #       (b) 不依赖 self-hosted PG，不与本机 ransomware 教训 (2026-04-11) 沾边；
  #       (c) 端口仅 runner localhost:5432，不暴露公网。
  #   - migration 不预跑：testDSN()+Migrate() pattern 由各 Test 自己调（见
  #     migrate_test.go），goose 幂等，重复 Migrate 是 no-op。
  #
  # 失败语义：本 job 红 → 阻塞 PR（与 go-ci 并列）；service container 起不来
  # 自动 fail-fast，无需手动 health probe step。
  # -----------------------------------------------------------------
  db-integration:
    name: db (PG service container + integration)
    runs-on: ubuntu-latest
    # postgres:17-alpine 比 17 小 ~150MB，pull 快；alpine 同样有 pg_isready
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: aion_test
          POSTGRES_PASSWORD: aion_test
          POSTGRES_DB: aion_test
        ports:
          - 5432:5432
        # service container 自带 health check 协议；--health-cmd 通过 options 注入
        # GitHub Actions 在所有 health check 通过前不会启动后续 step
        options: >-
          --health-cmd "pg_isready -U aion_test -d aion_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go (with module cache)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.WORK_DIR }}/go.sum

      - name: go mod download
        working-directory: ${{ env.WORK_DIR }}
        run: go mod download

      # 各 Test 内部调 Migrate(ctx, dsn) → goose.UpContext 把 135 个嵌入 SQL 全跑一遍。
      # 不在这里独立 migrate，原因：
      #   (1) Migrate() 是包内函数，没有独立 cmd 入口；
      #   (2) goose 幂等：第二个 Test 再调也 no-op；
      #   (3) 保持与本地 `go test` 行为一致（最小化"CI 跑得过本地跑不过"风险）。
      - name: go test (internal/database, env-gated SPs activated)
        working-directory: ${{ env.WORK_DIR }}
        env:
          AION_TEST_PG_HOST: localhost
          AION_TEST_PG_PORT: '5432'
          AION_TEST_PG_USER: aion_test
          AION_TEST_PG_PASS: aion_test
          AION_TEST_PG_DB: aion_test
        run: |
          go test ./internal/database/... \
            -count=1 \
            -v \
            -timeout=10m \
            -coverprofile=db-coverage.out \
            -covermode=atomic

      - name: db coverage summary (stdout)
        working-directory: ${{ env.WORK_DIR }}
        run: go tool cover -func=db-coverage.out | tail -1

      # 单独工件名 db-coverage，避免与 go-ci 的 coverage-internal 冲突；
      # 后续如要合并报表，下载两个 .out 用 `go tool cover` 拼。
      - name: upload db coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-coverage
          path: ${{ env.WORK_DIR }}/db-coverage.out
          retention-days: 14
          if-no-files-found: error
