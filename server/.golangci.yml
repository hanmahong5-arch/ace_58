# AionCore 5.8 — golangci-lint 配置 (schema v2)
#
# 设计原则:
#   - 保守起步: 只开 5 个高信号 linter (v2 把 gosimple 合并入 staticcheck, 信号不丢)
#   - debt ratchet: 当前不强制 (CI 不 gate), 让团队按节奏修
#   - 范围限定: 只看 ./internal/...; cmd/spike + cmd/director 是 WIP, 全豁免
#   - 测试代码豁免 errcheck (test 允许忽略错误以保持简洁)
#   - schema v2 (golangci-lint >= v2.x); v2 用 go1.25 编, 与项目 go 版本对齐
#
# 详见 doc/lint.md
version: "2"
run:
  go: "1.25"
  modules-download-mode: readonly
  issues-exit-code: 1
linters:
  default: none
  enable:
    - errcheck       # 未检查的 error 返回值 (高信号: 漏 close/漏处理 SP 错)
    - govet          # go vet (CI 已跑, 这里再叠一层显式声明)
    - ineffassign    # 无效赋值 (写了变量但没用上)
    - staticcheck    # SA*/S*/QF* 全家桶 (v2 已合并 gosimple)
    - unused         # 未使用的变量/函数/字段 (跨包识别死代码)
  settings:
    errcheck:
      # 不强制类型断言检查 (会和 mock 测试代码冲突)
      check-type-assertions: false
      # 不强制空标识符赋值 (`_, _ = ...` 是合法的显式忽略)
      check-blank: false
    staticcheck:
      # SA1019 = "deprecated 用法警告"; 暂时关掉避免 pgx/v5 等依赖升级噪音
      # 等到一轮 deprecation 集中清理周期再开
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # 测试代码允许忽略 error (写 test 时常 `db.Exec(...)` 不接 err)
      - linters:
          - errcheck
        path: _test\.go
      # cmd/spike 是 WIP (有 int32 overflow), 不参与 lint
      - linters:
          - errcheck
          - staticcheck
          - unused
        path: src/cmd/spike/
      # cmd/director 是 in-flight round 的, 行为未冻结
      - linters:
          - errcheck
          - staticcheck
        path: src/cmd/director/
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
issues:
  # 同一类问题最多上报 50 条 (避免一个 finding 把 stdout 刷爆)
  max-same-issues: 50
  # 单个 linter 最多上报 100 条
  max-issues-per-linter: 100
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
